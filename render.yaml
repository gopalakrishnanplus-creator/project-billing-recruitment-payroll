databases:
  - name: pbrp-postgres
    plan: basic_256mb
    databaseName: pbrp
    user: pbrp_user

services:
  - type: web
    name: pbrp-api
    runtime: python
    rootDir: backend
    plan: starter
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: pbrp-postgres
          property: connectionString
      - key: PYTHON_VERSION
        value: 3.11.15
      - key: CORS_ORIGINS
        sync: false

  - type: web
    name: pbrp-app
    runtime: node
    rootDir: frontend
    plan: starter
    buildCommand: npm ci && npm run build
    startCommand: npm run start
    envVars:
      - key: VITE_API_BASE_URL
        sync: false

databases:
  - name: pbrp-postgres
    plan: basic_256mb
    databaseName: pbrp
    user: pbrp_user

services:
  - type: web
    name: pbrp-api
    runtime: python
    rootDir: backend
    plan: starter
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: pbrp-postgres
          property: connectionString
      - key: PYTHON_VERSION
        value: 3.11.15
      - key: CORS_ORIGINS
        value: https://pbrp-web.onrender.com
      - key: FRONTEND_URL
        value: https://pbrp-web.onrender.com
      - key: API_BASE_URL
        value: https://pbrp-api.onrender.com
      - key: SESSION_SECRET
        generateValue: true
      - key: SESSION_COOKIE_SECURE
        value: "true"
      - key: SESSION_SAME_SITE
        value: none
      - key: SYSTEM_ADMIN_EMAIL
        value: Gopala.Krishnan@flexgcc.com
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: GOOGLE_REDIRECT_URI
        value: https://pbrp-api.onrender.com/auth/callback

  - type: web
    name: pbrp-web
    runtime: node
    rootDir: frontend
    plan: starter
    buildCommand: npm ci && npm run build
    startCommand: npm run start
    envVars:
      - key: VITE_API_BASE_URL
        sync: false
